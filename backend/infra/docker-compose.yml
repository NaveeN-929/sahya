services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: sahay
      POSTGRES_PASSWORD: sahay
      POSTGRES_DB: sahay
    ports:
      - "5432:5432"
    volumes:
      - sahay-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sahay -d sahay"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  sahay-postgres-data:
