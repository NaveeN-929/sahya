services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: sahay
      POSTGRES_PASSWORD: sahay
      POSTGRES_DB: sahay
    ports:
      - "5432:5432"
    volumes:
      - sahay-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sahay -d sahay"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Local LLM runtime for the AI Companion (PRD §9.7 — self-hosted models are fine for a
  # narrow scope at this team's current scale; this is the dev/MVP provider, swappable for
  # a hosted provider later via OLLAMA_BASE_URL / a different LlmProvider impl).
  # After `docker compose up -d`, pull a model once: `docker compose exec ollama ollama pull llama3.2`
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - sahay-ollama-data:/root/.ollama

volumes:
  sahay-postgres-data:
  sahay-ollama-data:
